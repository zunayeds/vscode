name: Build Custom VS Code

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Pulls the correct Node version automatically
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Build Dependencies
        # Added 'fakeroot' at the very end of this list
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libsecret-1-dev libnotify-bin libkrb5-dev fakeroot

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build and Minify VS Code
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx gulp vscode-linux-x64-min

      - name: Build Debian Package (.deb)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          mkdir -p ../VSCode-linux-x64/bin
          echo '#!/usr/bin/env bash' > ../VSCode-linux-x64/bin/code-tunnel-oss
          chmod +x ../VSCode-linux-x64/bin/code-tunnel-oss

          sed -i 's/FAIL_BUILD_FOR_NEW_DEPENDENCIES: boolean = true/FAIL_BUILD_FOR_NEW_DEPENDENCIES: boolean = false/g' build/linux/dependencies-generator.ts

          npx gulp vscode-linux-x64-prepare-deb
          npx gulp vscode-linux-x64-build-deb

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: vivaldi-vscode-linux-deb
          # This targets the exact folder where the Gulp task outputs the .deb file
          path: .build/linux/deb/amd64/deb/*.deb

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Automatically generates a unique tag based on the GitHub Action run number
          tag_name: custom-build-${{ github.run_number }}
          name: Custom VS Code Build #${{ github.run_number }}
          body: "Automated custom Debian build of VS Code."
          # Points exactly to where the .deb file is staged
          files: .build/linux/deb/amd64/deb/*.deb
          draft: false
          prerelease: false
