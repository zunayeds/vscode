name: Build Custom VS Code

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Pulls the correct Node version automatically

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libsecret-1-dev libnotify-bin libkrb5-dev

      - name: Install NPM Dependencies
        # Using npm ci instead of yarn for clean, reliable CI installation
        run: npm ci

      - name: Build and Minify VS Code
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        # Using npx to trigger the local gulp binary installed by npm
        run: npx gulp vscode-linux-x64-min

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-vscode-linux-x64
          path: ../VSCode-linux-x64/
